<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>X Mock</title></head>
<body>
  <article>
    <div data-testid="UserAvatar">
      <img src="https://pbs.twimg.com/profile_images/test/avatar.jpg" alt="avatar" width="48" height="48" />
    </div>
    <div data-testid="tweetPhoto">
      <img src="https://pbs.twimg.com/media/test-image.jpg" alt="Image" width="500" height="300" />
    </div>
    <p>This is a mock tweet with an image</p>
  </article>
  <article>
    <div data-testid="videoPlayer">
      <video src="test.mp4"></video>
    </div>
    <p>This is a mock tweet with a video</p>
  </article>
  <article>
    <div data-testid="card.wrapper">
      <img src="https://pbs.twimg.com/card_img/test-card.jpg" alt="card" width="300" height="150" />
    </div>
    <p>This is a mock tweet with a link card</p>
  </article>
</body>
</html>
